<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js" type="module" defer></script>
    
</head>
<body>
    <div id="geral">
        <h3>Desconto nas renda</h3>

        <p>São isentos as pessoas menor de idade com renda abaixo e com renda até R$ 1700,00</p>
        <p>De 1.701,00 até 5.000,00 -> 5%</p>
        <p>De 5.001,00 até 8.000,00-> 8%</p>
        <p>De 8.001,00 até 10.000,00-> 10%</p>
        <p>De 10.000,00 em diante -> 3%</p>

        <div id="div-form">
            <form id="formulario">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome"><br>
                <br>
                <label for="idade">Idade</label>
                <input type="text" name="idade" id="idade"><br>
                <br>
                <label for="renda">Renda</label>
                <input type="text" name="renda" id="renda"><br>
                <br>
                <button type="submit">Adicionar</button>
                <button type="reset">Limpar</button>
            </form>
        </div>

        <div id="div-lista-pessoas">

        </div>
    </div>
</body>
</html>
